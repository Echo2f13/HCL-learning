<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HCI Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <h1 class="app-title">HCI Quiz</h1>
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">🌙</button>
  </header>

  <main class="main-content">
    <section id="weeks-section" class="section active">
    </section>

    <section id="quiz-section" class="section">
    </section>

    <section id="progress-section" class="section">
    </section>
  </main>

  <nav class="tab-bar" aria-label="Main navigation">
    <button class="tab active" data-tab="weeks">📚 Weeks</button>
    <button class="tab" data-tab="quiz">✏️ Quiz</button>
    <button class="tab" data-tab="progress">📊 Progress</button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
